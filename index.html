<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gracie Plonisch | Coming Soon</title>
  <meta name="description" content="Gracie Plonisch - Coming Soon">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;300;400;500;600;700&family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #07080a;
      --bg-secondary: #0d0f14;
      --accent: #6c63ff;
      --accent-2: #00d4ff;
      --accent-3: #ff6cf0;
      --text-primary: #f0f0f5;
      --text-secondary: #6b7280;
      --glass: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.06);
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Outfit', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
    }

    /* Animated gradient mesh background */
    .gradient-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .gradient-mesh .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.4;
      animation: float 20s ease-in-out infinite;
    }

    .gradient-mesh .orb:nth-child(1) {
      width: 600px;
      height: 600px;
      background: var(--accent);
      top: -15%;
      left: -10%;
      animation-delay: 0s;
      animation-duration: 25s;
    }

    .gradient-mesh .orb:nth-child(2) {
      width: 500px;
      height: 500px;
      background: var(--accent-2);
      bottom: -20%;
      right: -10%;
      animation-delay: -5s;
      animation-duration: 22s;
    }

    .gradient-mesh .orb:nth-child(3) {
      width: 400px;
      height: 400px;
      background: var(--accent-3);
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      animation-delay: -10s;
      animation-duration: 28s;
    }

    .gradient-mesh .orb:nth-child(4) {
      width: 300px;
      height: 300px;
      background: #00ffa3;
      top: 20%;
      right: 20%;
      animation-delay: -7s;
      animation-duration: 20s;
      opacity: 0.2;
    }

    @keyframes float {
      0%, 100% { transform: translate(0, 0) scale(1); }
      25% { transform: translate(80px, -60px) scale(1.1); }
      50% { transform: translate(-40px, 80px) scale(0.95); }
      75% { transform: translate(60px, 40px) scale(1.05); }
    }

    /* Grid overlay */
    .grid-overlay {
      position: fixed;
      inset: 0;
      z-index: 1;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.015) 1px, transparent 1px);
      background-size: 80px 80px;
      animation: gridShift 30s linear infinite;
    }

    @keyframes gridShift {
      0% { transform: translate(0, 0); }
      100% { transform: translate(80px, 80px); }
    }

    /* Noise texture */
    .noise {
      position: fixed;
      inset: 0;
      z-index: 2;
      opacity: 0.035;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      pointer-events: none;
    }

    /* Scan line */
    .scanline {
      position: fixed;
      inset: 0;
      z-index: 2;
      background: linear-gradient(
        to bottom,
        transparent 0%,
        rgba(108, 99, 255, 0.03) 50%,
        transparent 100%
      );
      background-size: 100% 8px;
      pointer-events: none;
      animation: scanMove 8s linear infinite;
    }

    @keyframes scanMove {
      0% { background-position: 0 0; }
      100% { background-position: 0 100vh; }
    }

    /* Floating particles */
    .particles {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .particle {
      position: absolute;
      width: 2px;
      height: 2px;
      background: var(--accent-2);
      border-radius: 50%;
      opacity: 0;
      animation: particleFloat linear infinite;
    }

    @keyframes particleFloat {
      0% { opacity: 0; transform: translateY(100vh) scale(0); }
      10% { opacity: 1; }
      90% { opacity: 1; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1); }
    }

    /* Main content */
    .content {
      position: relative;
      z-index: 10;
      text-align: center;
      padding: 2rem;
      max-width: 900px;
    }

    /* Top badge */
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 20px;
      border-radius: 100px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(20px);
      font-size: 0.8rem;
      font-weight: 400;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 3rem;
      animation: fadeInDown 1s ease-out 0.2s both;
    }

    .badge .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent-2);
      animation: pulse 2s ease-in-out infinite;
      box-shadow: 0 0 10px var(--accent-2);
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.8); }
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Name heading */
    .name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(3rem, 8vw, 7rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      margin-bottom: 1.5rem;
      animation: fadeInUp 1s ease-out 0.5s both;
      position: relative;
    }

    .name .first {
      display: block;
      background: linear-gradient(135deg, #ffffff 0%, #c0c0d0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .name .last {
      display: block;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent-2) 50%, var(--accent-3) 100%);
      background-size: 200% 200%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradientShift 5s ease-in-out infinite;
    }

    @keyframes gradientShift {
      0%, 100% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Divider line */
    .divider {
      width: 80px;
      height: 1px;
      margin: 2rem auto;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      animation: fadeInUp 1s ease-out 0.8s both, shimmer 3s ease-in-out infinite;
      position: relative;
    }

    .divider::after {
      content: '';
      position: absolute;
      inset: -2px;
      background: linear-gradient(90deg, transparent, var(--accent), var(--accent-2), transparent);
      filter: blur(8px);
      opacity: 0.5;
    }

    @keyframes shimmer {
      0%, 100% { width: 80px; opacity: 1; }
      50% { width: 120px; opacity: 0.7; }
    }

    /* Tagline */
    .tagline {
      font-size: clamp(1rem, 2.5vw, 1.3rem);
      font-weight: 300;
      color: var(--text-secondary);
      letter-spacing: 0.02em;
      line-height: 1.6;
      max-width: 500px;
      margin: 0 auto 3rem;
      animation: fadeInUp 1s ease-out 1s both;
    }

    /* Glass card */
    .glass-card {
      display: inline-flex;
      align-items: center;
      gap: 2rem;
      padding: 1.5rem 2.5rem;
      border-radius: 20px;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      backdrop-filter: blur(30px);
      animation: fadeInUp 1s ease-out 1.3s both;
    }

    .countdown-group {
      text-align: center;
    }

    .countdown-group .number {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.5rem, 3vw, 2.2rem);
      font-weight: 600;
      background: linear-gradient(135deg, var(--text-primary), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .countdown-group .label {
      font-size: 0.65rem;
      text-transform: uppercase;
      letter-spacing: 0.2em;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .separator {
      width: 1px;
      height: 40px;
      background: var(--glass-border);
    }

    /* Bottom CTA */
    .notify-section {
      margin-top: 3rem;
      animation: fadeInUp 1s ease-out 1.6s both;
    }

    .notify-btn {
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 32px;
      border: none;
      border-radius: 100px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      font-family: 'Outfit', sans-serif;
      font-size: 0.9rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      overflow: hidden;
    }

    .notify-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--accent-2), var(--accent-3));
      opacity: 0;
      transition: opacity 0.4s ease;
    }

    .notify-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 40px rgba(108, 99, 255, 0.3);
    }

    .notify-btn:hover::before {
      opacity: 1;
    }

    .notify-btn span {
      position: relative;
      z-index: 1;
    }

    .notify-btn svg {
      position: relative;
      z-index: 1;
      transition: transform 0.3s ease;
    }

    .notify-btn:hover svg {
      transform: translateX(4px);
    }

    /* Corner accents */
    .corner {
      position: fixed;
      z-index: 10;
      opacity: 0.15;
    }

    .corner--tl {
      top: 30px;
      left: 30px;
      width: 60px;
      height: 60px;
      border-top: 1px solid var(--accent);
      border-left: 1px solid var(--accent);
      animation: fadeIn 1s ease-out 2s both;
    }

    .corner--br {
      bottom: 30px;
      right: 30px;
      width: 60px;
      height: 60px;
      border-bottom: 1px solid var(--accent-2);
      border-right: 1px solid var(--accent-2);
      animation: fadeIn 1s ease-out 2s both;
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 0.15; }
    }

    /* Bottom status bar */
    .status-bar {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 1.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--text-secondary);
      animation: fadeIn 1s ease-out 2.5s both;
    }

    .status-bar .line {
      width: 30px;
      height: 1px;
      background: var(--glass-border);
    }

    /* Responsive */
    @media (max-width: 600px) {
      .glass-card {
        gap: 1.2rem;
        padding: 1.2rem 1.8rem;
      }

      .status-bar {
        display: none;
      }

      .corner { display: none; }
    }
  </style>
</head>
<body>

  <!-- Background layers -->
  <div class="gradient-mesh">
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
    <div class="orb"></div>
  </div>
  <div class="grid-overlay"></div>
  <div class="noise"></div>
  <div class="scanline"></div>

  <!-- Particles -->
  <div class="particles" id="particles"></div>

  <!-- Corner accents -->
  <div class="corner corner--tl"></div>
  <div class="corner corner--br"></div>

  <!-- Main content -->
  <div class="content">
    <div class="badge">
      <span class="dot"></span>
      <span>Coming Soon</span>
    </div>

    <h1 class="name">
      <span class="first">Gracie</span>
      <span class="last">Plonisch</span>
    </h1>

    <div class="divider"></div>

    <p class="tagline">Something extraordinary is in the works. Stay tuned for the reveal.</p>

    <div class="glass-card">
      <div class="countdown-group">
        <div class="number" id="days">00</div>
        <div class="label">Days</div>
      </div>
      <div class="separator"></div>
      <div class="countdown-group">
        <div class="number" id="hours">00</div>
        <div class="label">Hours</div>
      </div>
      <div class="separator"></div>
      <div class="countdown-group">
        <div class="number" id="minutes">00</div>
        <div class="label">Minutes</div>
      </div>
      <div class="separator"></div>
      <div class="countdown-group">
        <div class="number" id="seconds">00</div>
        <div class="label">Seconds</div>
      </div>
    </div>

    <div class="notify-section">
      <button class="notify-btn" onclick="this.innerHTML='<span>We\'ll be in touch</span>'">
        <span>Get Notified</span>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M5 12h14M12 5l7 7-7 7"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Status bar -->
  <div class="status-bar">
    <span>EST. 2026</span>
    <div class="line"></div>
    <span>GraciePlonisch.com</span>
  </div>

  <script>
    // Countdown — 30 days from now
    const launchDate = new Date();
    launchDate.setDate(launchDate.getDate() + 30);

    function updateCountdown() {
      const now = new Date();
      const diff = launchDate - now;

      const days = Math.floor(diff / (1000 * 60 * 60 * 24));
      const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((diff % (1000 * 60)) / 1000);

      document.getElementById('days').textContent = String(days).padStart(2, '0');
      document.getElementById('hours').textContent = String(hours).padStart(2, '0');
      document.getElementById('minutes').textContent = String(minutes).padStart(2, '0');
      document.getElementById('seconds').textContent = String(seconds).padStart(2, '0');
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);

    // Generate floating particles
    const particlesContainer = document.getElementById('particles');
    for (let i = 0; i < 40; i++) {
      const particle = document.createElement('div');
      particle.className = 'particle';
      particle.style.left = Math.random() * 100 + '%';
      particle.style.animationDuration = (Math.random() * 15 + 10) + 's';
      particle.style.animationDelay = (Math.random() * 20) + 's';
      particle.style.width = (Math.random() * 3 + 1) + 'px';
      particle.style.height = particle.style.width;

      const colors = ['#6c63ff', '#00d4ff', '#ff6cf0', '#00ffa3'];
      particle.style.background = colors[Math.floor(Math.random() * colors.length)];

      particlesContainer.appendChild(particle);
    }

    // Subtle mouse parallax on orbs
    document.addEventListener('mousemove', (e) => {
      const x = (e.clientX / window.innerWidth - 0.5) * 2;
      const y = (e.clientY / window.innerHeight - 0.5) * 2;

      const orbs = document.querySelectorAll('.orb');
      orbs.forEach((orb, i) => {
        const speed = (i + 1) * 8;
        orb.style.transform = `translate(${x * speed}px, ${y * speed}px)`;
      });
    });
  </script>
</body>
</html>
